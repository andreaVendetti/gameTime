<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head th:replace="~{template::bootstrap-head}">
		<meta charset="UTF-8">
		<title>GameTime</title>
	</head>
	<body>
		<div class="container">
			<form th:object="${videogioco}" th:action="@{/gametime/videogiochi/delete}" method="post">
				<input type="hidden" th:field="*{id}">
				<div class="alert alert-danger">
					<h5 class="alert-heading">
						Sei sicuro di voler eliminare
						<strong th:text="*{titolo}"></strong>
						Dalla tabella ?
					</h5>
					<hr>
					<button class="btn btn-danger" type="submit">Si</button>
					<a class="btn btn-secondary" th:href="@{/gametime/videogiochi}">Annulla</a>
				</div>
			</form>
		</div>
		<script th:replace="~{template::bootstrap-script}"></script>
	</body>
</html>
